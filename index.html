<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toolshelf · 設計收藏(分享版)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f6f9; --paper:#ffffff; --ink:#15171c; --ink-2:#646a76; --mut:#aeb4c0;
  --line:#e4e7ec; --accent:#1f3df0; --accent-soft:#e8ecff;
  --mono:"JetBrains Mono",ui-monospace,"SF Mono",Menlo,monospace;
  --sans:"Noto Sans TC","Helvetica Neue","PingFang TC",system-ui,sans-serif;
  --k0:#3454d4; --k1:#2e8c6a; --k2:#8a5bb8; --k3:#d2762e;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.6;padding:22px 24px 90px}
.wrap{max-width:1300px;margin:0 auto}
.top{display:flex;align-items:center;gap:14px}
.brand{display:flex;align-items:center;gap:10px;margin-right:auto}
.brand .sq{width:22px;height:22px;background:var(--accent);border-radius:6px}
.brand b{font-weight:700;font-size:17px;letter-spacing:-.01em}
.brand small{font-family:var(--mono);font-size:10px;color:var(--ink-2);letter-spacing:.06em}
.tools{display:flex;gap:8px;align-items:center}
.iconbtn{font-family:var(--mono);font-size:12px;height:36px;padding:0 13px;border:1px solid var(--line);border-radius:9px;background:var(--paper);cursor:pointer;color:var(--ink-2);display:inline-flex;align-items:center;transition:.12s}
.iconbtn:hover{border-color:var(--accent);color:var(--accent)}
.iconbtn.accent{background:var(--accent);color:#fff;border-color:var(--accent);font-family:var(--sans);font-weight:700}
.iconbtn.accent:hover{opacity:.9;color:#fff}
.showcase{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);margin:26px 0 12px}
.tabs{display:flex;gap:26px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
.tab{font-size:21px;font-weight:700;letter-spacing:-.01em;color:var(--mut);background:none;border:none;cursor:pointer;padding:0 0 12px;position:relative;font-family:var(--sans)}
.tab:hover{color:var(--ink-2)}
.tab.on{color:var(--ink)}
.tab.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:3px;border-radius:2px;background:var(--accent)}
.tab .n{font-family:var(--mono);font-size:11px;font-weight:400;color:var(--mut);margin-left:7px;vertical-align:3px}
.subbar{display:flex;flex-wrap:wrap;gap:7px;margin-top:16px;align-items:center}
.chip{font-family:var(--mono);font-size:12px;border:1px solid var(--line);background:var(--paper);color:var(--ink-2);border-radius:9px;padding:7px 12px;cursor:pointer;transition:.12s}
.chip:hover{border-color:var(--accent)}
.chip.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip .ct{opacity:.6;margin-left:5px}
.manage{font-family:var(--mono);font-size:11px;color:var(--ink-2);background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px;margin-left:4px}
.manage:hover{color:var(--accent)}
.searchrow{position:relative;margin-top:14px;max-width:380px}
.search{width:100%;font-family:var(--sans);font-size:14px;padding:10px 12px 10px 32px;border:1px solid var(--line);border-radius:9px;background:var(--paper);color:var(--ink)}
.search:focus{outline:2px solid var(--accent);border-color:transparent}
.search::placeholder{color:var(--mut)}
.searchrow::before{content:"\2315";position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--mut);font-size:15px}
.ctrls{display:flex;gap:10px;align-items:center;margin-top:14px;flex-wrap:wrap}
.ctrls .searchrow{margin-top:0;flex:1;min-width:200px}
.sortsel{font-family:var(--mono);font-size:12px;height:40px;padding:0 10px;border:1px solid var(--line);border-radius:9px;background:var(--paper);color:var(--ink-2);cursor:pointer}
.sortsel:focus{outline:2px solid var(--accent);border-color:transparent}
.tagfilter{margin-top:12px;min-height:0}
.tagfilter:empty{display:none}
.tfchip{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:12px;background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-soft);border-radius:999px;padding:5px 6px 5px 12px}
.tfchip button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:14px;line-height:1;padding:0 4px}
.fav{width:16px;height:16px;border-radius:4px;flex:none;object-fit:cover;background:#eef0f4}
.urlrow{display:flex;gap:8px}.urlrow input{flex:1}
.tg.tgc{cursor:pointer;background:none;font-family:var(--mono)}
.tg.tgc:hover{border-color:var(--accent);color:var(--accent)}
.grid{margin-top:22px;display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(252px,1fr))}
.tile{background:var(--paper);border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;transition:transform .15s,border-color .15s,box-shadow .15s}
.tile:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 8px 24px rgba(31,61,240,.08)}
.tile:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.thumb{aspect-ratio:16/10;position:relative;overflow:hidden;background:#eef0f4;border-bottom:1px solid var(--line)}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s}
.tile:hover .thumb img{transform:scale(1.04)}
.ph{position:absolute;inset:0;display:flex;align-items:flex-end;padding:14px;background:linear-gradient(150deg,color-mix(in srgb,var(--cat,#888) 16%,#fff),#fff 72%)}
.ph::after{content:"";position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:6px;background:var(--cat,#888);opacity:.9}
.ph .nm{position:relative;font-weight:700;font-size:clamp(17px,3.6vw,23px);line-height:1.12;letter-spacing:-.01em;color:color-mix(in srgb,var(--cat,#888) 60%,var(--ink));max-height:2.3em;overflow:hidden;word-break:break-word}
.tbody{padding:12px 13px 14px;display:flex;flex-direction:column;gap:6px;flex:1}
.trow{display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--cat,#888);flex:none}
.cat{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-soft);border-radius:5px;padding:2px 7px;margin-left:auto}
.tsub{font-family:var(--mono);font-size:10px;color:var(--ink-2)}
.tname{font-weight:500;font-size:15px;line-height:1.35}
.tdesc{font-size:12.5px;color:var(--ink-2);line-height:1.5;max-height:3em;overflow:hidden}
.empty{grid-column:1/-1;text-align:center;color:var(--ink-2);font-family:var(--mono);font-size:13px;padding:60px 0}
.empty b{display:block;color:var(--ink);font-family:var(--sans);font-size:16px;margin-bottom:6px}
.foot{margin-top:38px;font-family:var(--mono);font-size:11px;color:var(--ink-2);display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap}
.foot button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.foot .sponsor{font-family:var(--mono);font-size:11px;color:var(--accent);text-decoration:none;background:var(--accent-soft);border:1px solid var(--accent-soft);border-radius:7px;padding:4px 10px;transition:background .15s,color .15s}
.foot .sponsor:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.overlay{position:fixed;inset:0;background:rgba(21,23,28,.4);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:5vh 18px;z-index:50;overflow-y:auto}
.overlay.show{display:flex}
.sheet{background:var(--paper);border:1px solid var(--line);border-radius:16px;width:100%;max-width:660px;overflow:hidden;box-shadow:0 24px 60px rgba(21,23,28,.18)}
.sheet.wide{max-width:720px}
.shead{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--line)}
.shead h3{font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-2);font-weight:500}
.x{background:none;border:none;color:var(--ink-2);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px}
.x:hover{color:var(--ink)}
.sbody{padding:18px}
.dimg{width:100%;aspect-ratio:16/9;border-radius:11px;overflow:hidden;border:1px solid var(--line);position:relative;background:#eef0f4}
.dimg img{width:100%;height:100%;object-fit:cover;display:block}
.dmeta{display:flex;align-items:center;gap:9px;margin-top:15px;font-family:var(--mono);font-size:11px;color:var(--ink-2)}
.detail h2{font-size:22px;font-weight:700;margin:7px 0 3px;letter-spacing:-.01em}
.dhost{font-family:var(--mono);font-size:12px;color:var(--ink-2);word-break:break-all}
.ddesc{font-size:14px;color:#3a3f4b;line-height:1.75;margin-top:13px;white-space:pre-wrap}
.tagrow{display:flex;flex-wrap:wrap;gap:7px;margin-top:15px}
.tg{font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:7px;border:1px solid var(--line);color:var(--ink-2)}
.dact{display:flex;gap:9px;margin-top:20px;flex-wrap:wrap}
.visit{font-family:var(--sans);font-weight:700;font-size:14px;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px 20px;cursor:pointer;text-decoration:none;display:inline-block}
.visit:hover{opacity:.9}
.tbtn{font-family:var(--sans);font-size:13px;background:var(--paper);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:11px 15px;cursor:pointer}
.tbtn:hover{border-color:var(--accent);color:var(--accent)}
.tbtn.danger{color:#c0392b;border-color:transparent}
.tbtn.danger:hover{border-color:#c0392b}
.field{margin-bottom:13px}
.field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2);margin-bottom:5px}
.field input,.field textarea,.field select{width:100%;font-family:var(--sans);font-size:14px;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
.field textarea{min-height:84px;resize:vertical;line-height:1.6}
.field input:focus,.field textarea:focus,.field select:focus{outline:2px solid var(--accent);border-color:transparent}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.imgpick{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.imgpick .preview{width:92px;height:58px;border-radius:7px;border:1px solid var(--line);object-fit:cover;background:var(--bg);display:none}
.imgpick .preview.show{display:block}
.hint{font-family:var(--mono);font-size:10px;color:var(--mut);margin-top:5px;line-height:1.5}
.facts{display:flex;gap:9px;margin-top:18px;justify-content:flex-end}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:10px 18px;border-radius:999px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:60}
.toast.show{opacity:1}
.cm .grp{border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px}
.cm .gh{display:flex;align-items:center;gap:8px;font-weight:500;font-size:14px;margin-bottom:9px}
.cm .gh .dot{width:9px;height:9px}
.cm .gh .cnt{font-family:var(--mono);font-size:11px;color:var(--ink-2)}
.cm .gh button{margin-left:auto;font-family:var(--mono);font-size:11px;background:none;border:none;color:var(--ink-2);cursor:pointer}
.cm .gh button:hover{color:#c0392b}
.cm .subs{display:flex;flex-wrap:wrap;gap:6px}
.cm .pill{font-family:var(--mono);font-size:11px;background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:4px 7px 4px 10px;display:flex;align-items:center;gap:6px}
.cm .pill button{background:none;border:none;color:var(--ink-2);cursor:pointer;font-size:13px;line-height:1}
.cm .pill button:hover{color:#c0392b}
.cm .pill button.ren:hover{color:var(--accent)}
.cm .gh button.ren:hover{color:var(--accent)}
.cm .gh .nm{font-weight:500}
.cm .add{font-family:var(--mono);font-size:11px;color:var(--ink-2);background:none;border:1px dashed var(--line);border-radius:999px;padding:4px 10px;cursor:pointer}
.cm .add:hover{color:var(--accent);border-color:var(--accent)}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
@media (max-width:520px){.two{grid-template-columns:1fr}body{padding:18px 14px 80px}.tab{font-size:18px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand"><span class="sq"></span><b>Toolshelf</b><small>DESIGN COLLECTION · 分享版</small></div>
    <div class="tools">
      <button class="iconbtn" id="exportBtn">匯出</button>
      <button class="iconbtn" id="importBtn">匯入</button>
      <button class="iconbtn accent" id="addBtn">＋ 收藏</button>
      <input type="file" id="importFile" accept=".json,application/json,text/plain,text/json" hidden>
    </div>
  </div>
  <div class="showcase" id="showcase">SHOWCASE — 全部</div>
  <div class="tabs" id="tabs"></div>
  <div class="subbar" id="subbar"></div>
  <div class="ctrls">
    <div class="searchrow"><input class="search" id="search" type="search" placeholder="搜尋名稱、標籤、用途…" aria-label="搜尋"></div>
    <select class="sortsel" id="sortSel" aria-label="排序"><option value="recent">最近加入</option><option value="az">A–Z</option></select>
  </div>
  <div class="tagfilter" id="tagFilter"></div>
  <div class="grid" id="grid"></div>
  <div class="foot"><span id="footCount"></span><span>由 Yen 整理 · 點卡片看介紹、造訪原站</span><a id="sponsorLink" class="sponsor" target="_blank" rel="noopener" style="display:none"></a></div>
</div>
<div class="overlay" id="detailOverlay"><div class="sheet detail" id="detailSheet" role="dialog" aria-modal="true"></div></div>
<div class="overlay" id="formOverlay">
  <div class="sheet wide" role="dialog" aria-modal="true">
    <div class="shead"><h3 id="formTitle">收藏網站</h3><button class="x" data-cf aria-label="關閉">×</button></div>
    <div class="sbody">
      <div class="field"><label>名稱</label><input id="i-title" placeholder="網站名稱"></div>
      <div class="field"><label>網址</label><div class="urlrow"><input id="i-url" placeholder="https://…"><button type="button" class="tbtn" id="grabMeta">帶入資訊</button></div></div>
      <div class="two"><div class="field"><label>大類</label><select id="i-main"></select></div><div class="field"><label>小類</label><select id="i-sub"></select></div></div>
      <div class="field"><label>標籤（逗號分隔）</label><input id="i-tags" placeholder="動畫, prompt, 日本"></div>
      <div class="field"><label>描述</label><textarea id="i-desc" placeholder="做了什麼、為什麼值得收"></textarea></div>
      <div class="field"><label>縮圖（選填）</label>
        <div class="imgpick">
          <button type="button" class="tbtn" id="grabImg">自動抓縮圖</button>
          <button type="button" class="tbtn" id="uploadImgBtn">上傳圖片</button>
          <input type="file" id="imgFile" accept="image/*" hidden>
          <input id="i-img" placeholder="或貼圖片網址" style="flex:1;min-width:140px">
          <img class="preview" id="imgPreview" alt="">
        </div>
        <div class="hint">先填網址再按「自動抓縮圖」會試抓該頁預覽圖；沒圖就用分類色生成佔位。</div>
      </div>
      <div class="facts"><button class="tbtn" data-cf>取消</button><button class="visit" id="saveBtn">收進收藏櫃</button></div>
    </div>
  </div>
</div>
<div class="overlay" id="catOverlay">
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="shead"><h3>管理類別</h3><button class="x" data-cc aria-label="關閉">×</button></div>
    <div class="sbody cm" id="catManage"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>

let data={taxonomy:{},items:[]};
let activeMain='全部', activeSub='全部', query='', editId=null, pendingImg='', activeTag='', sortMode='recent';
const $=id=>document.getElementById(id);
const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const mains=()=>Object.keys(data.taxonomy);
const kcol=name=>{const i=mains().indexOf(name);return i>=0?KCOL[i%KCOL.length]:'#888';};
const host=u=>{try{return new URL(u).hostname.replace(/^www\./,'');}catch(e){return'';}};
const fav=u=>{const h=host(u);return h?'https://www.google.com/s2/favicons?domain='+encodeURIComponent(h)+'&sz=64':'';};
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1600);}
// 在 Claude 預覽裡用 window.storage;下載成獨立檔案或部署到網域時,自動改用瀏覽器 localStorage
const HAS_CLAUDE_STORE = !!(window.storage && window.storage.get && window.storage.set);
async function storeGet(k){
  if(HAS_CLAUDE_STORE){ const r=await window.storage.get(k); return r?r.value:null; }
  try{ return localStorage.getItem(k); }catch(e){ return null; }
}
async function storeSet(k,v){
  if(HAS_CLAUDE_STORE){ await window.storage.set(k,v); return; }
  localStorage.setItem(k,v);
}
async function load(){
  // 唯讀版:啟動時讀外部 collection.json(資料與程式碼分離,更新只要換這個檔)。
  // 讀不到就退回內嵌 SEED_DATA——file:// 直接雙擊會被 CORS 擋、讀不到本地 json,靠這個備援才不會整頁空白。
  // 不使用 localStorage:唯讀版沒有使用者編輯要保存,快取只會讓更新後的 collection.json 讀到舊資料。
  try{
    const resp = await fetch('collection.json', {cache:'no-store'});
    if(resp.ok){
      const j = await resp.json();
      if(j && Array.isArray(j.items)){
        data = j;
        if(!data.taxonomy) data.taxonomy = {};
        return;
      }
    }
  }catch(e){ /* fetch 失敗(CORS / 網路 / JSON 壞掉)→ 退回內嵌 SEED */ }
  data = structuredClone(SEED_DATA);
}
async function save(silent){
  try{ await storeSet(STORE_KEY, JSON.stringify(data)); }
  catch(e){ if(!silent) toast('儲存失敗(可能超出瀏覽器儲存上限),本次變更只在這次瀏覽中'); }
}
function renderTabs(){
  const t=$('tabs'); t.innerHTML='';
  ['全部',...mains()].forEach(name=>{
    const n = name==='全部'? data.items.length : data.items.filter(it=>it.main===name).length;
    const b=document.createElement('button'); b.className='tab'+(activeMain===name?' on':'');
    b.innerHTML=esc(name)+'<span class="n">'+n+'</span>';
    b.onclick=()=>{ activeMain=name; activeSub='全部'; activeTag=''; render(); }; t.appendChild(b);
  });
  $('showcase').textContent='SHOWCASE — '+activeMain;
}
function renderSub(){
  const sb=$('subbar'); sb.innerHTML='';
  if(activeMain==='全部'){ if(!READ_ONLY){ const mg=document.createElement('button'); mg.className='manage'; mg.textContent='管理類別'; mg.onclick=openCat; sb.appendChild(mg); } return; }
  const all=document.createElement('button'); all.className='chip'+(activeSub==='全部'?' on':''); all.textContent='全部'; all.onclick=()=>{activeSub='全部';activeTag='';render();}; sb.appendChild(all);
  (data.taxonomy[activeMain]||[]).forEach(s=>{
    const n=data.items.filter(it=>it.main===activeMain&&it.sub===s).length;
    const b=document.createElement('button'); b.className='chip'+(activeSub===s?' on':'');
    b.innerHTML=esc(s)+(n?'<span class="ct">'+n+'</span>':''); b.onclick=()=>{activeSub=s;activeTag='';render();}; sb.appendChild(b);
  });
  const mg=document.createElement('button'); mg.className='manage'; mg.textContent='管理類別'; mg.onclick=openCat; if(!READ_ONLY) sb.appendChild(mg);
}
function visible(){
  const q=query.trim().toLowerCase();
  let list=data.items.filter(it=>{
    if(activeMain!=='全部'&&it.main!==activeMain)return false;
    if(activeSub!=='全部'&&it.sub!==activeSub)return false;
    if(activeTag&&!(it.tags||[]).includes(activeTag))return false;
    if(q&&!((it.title+it.desc+(it.tags||[]).join(' ')+it.url).toLowerCase().includes(q)))return false;
    return true;
  });
  if(sortMode==='az') list=list.slice().sort((a,b)=>a.title.localeCompare(b.title,'zh-Hant'));
  return list;
}
function renderTagFilter(){
  const f=$('tagFilter');
  if(activeTag){ f.innerHTML='<span class="tfchip">標籤：'+esc(activeTag)+'<button aria-label="清除">×</button></span>'; f.querySelector('button').onclick=()=>{activeTag='';render();}; }
  else f.innerHTML='';
}
function phHTML(title){ return '<div class="ph"><span class="nm">'+esc(title)+'</span></div>'; }
function render(){
  renderTabs(); renderSub(); renderTagFilter();
  $('footCount').textContent=data.items.length+' 收藏 · '+mains().length+' 大類';
  const list=visible(), g=$('grid'); g.innerHTML='';
  if(!list.length){ g.innerHTML='<div class="empty"><b>'+(data.items.length?'這個篩選下沒有收藏':'收藏櫃是空的')+'</b>'+(data.items.length?'換個分類或關鍵字':'按右上角「＋ 收藏」開始')+'</div>'; return; }
  list.forEach(it=>{
    const card=document.createElement('div'); card.className='tile'; card.tabIndex=0; card.setAttribute('role','button');
    card.style.setProperty('--cat',kcol(it.main));
    const thumb = it.image_url
      ? '<img src="'+esc(it.image_url)+'" alt="'+esc(it.title)+'" data-title="'+esc(it.title)+'" loading="lazy" onerror="window.__ph(this)">'
      : phHTML(it.title);
    const lead = it.url ? '<img class="fav" src="'+esc(fav(it.url))+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '<span class="dot"></span>';
    card.innerHTML='<div class="thumb">'+thumb+'</div><div class="tbody"><div class="trow">'+lead+'<span class="tsub">'+esc(it.sub||it.main)+'</span><span class="cat">'+esc(it.main)+'</span></div><div class="tname">'+esc(it.title)+'</div><div class="tdesc">'+esc(it.desc||'')+'</div></div>';
    card.onclick=()=>openDetail(it.id);
    card.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openDetail(it.id);}};
    g.appendChild(card);
  });
}
window.__ph=el=>{ el.outerHTML=phHTML(el.getAttribute('data-title')||''); };
function openDetail(id){
  const it=data.items.find(x=>x.id===id); if(!it)return;
  const s=$('detailSheet'); s.style.setProperty('--cat',kcol(it.main));
  const img = it.image_url
    ? '<img src="'+esc(it.image_url)+'" alt="'+esc(it.title)+'" data-title="'+esc(it.title)+'" onerror="window.__ph(this)">'
    : phHTML(it.title);
  const lead = it.url ? '<img class="fav" src="'+esc(fav(it.url))+'" alt="" onerror="this.style.display=\'none\'">' : '<span class="dot" style="background:'+kcol(it.main)+'"></span>';
  s.innerHTML='<div class="shead"><h3>'+esc(it.main)+(it.sub?' / '+esc(it.sub):'')+'</h3><button class="x" onclick="closeDetail()" aria-label="關閉">×</button></div><div class="sbody detail"><div class="dimg">'+img+'</div><div class="dmeta">'+lead+esc(it.main)+(it.sub?' / '+esc(it.sub):'')+'</div><h2>'+esc(it.title)+'</h2><div class="dhost">'+esc(host(it.url)||it.url||'（尚未填網址）')+'</div>'+(it.desc?'<div class="ddesc">'+esc(it.desc)+'</div>':'')+((it.tags&&it.tags.length)?'<div class="tagrow">'+it.tags.map(t=>'<button class="tg tgc" data-tag="'+esc(t)+'" onclick="filterTag(this)">'+esc(t)+'</button>').join('')+'</div>':'')+'<div class="dact">'+(it.url?'<a class="visit" href="'+esc(it.url)+'" target="_blank" rel="noopener">造訪網站 ↗</a>':'')+(READ_ONLY?'':('<button class="tbtn" onclick="startEdit(\''+it.id+'\')">編輯</button><button class="tbtn danger" onclick="delItem(\''+it.id+'\')">刪除</button>'))+'</div></div>';
  $('detailOverlay').classList.add('show');
}
window.closeDetail=()=>$('detailOverlay').classList.remove('show');
window.delItem=async id=>{ const it=data.items.find(x=>x.id===id); if(!it)return; if(!confirm('刪除「'+it.title+'」?'))return; data.items=data.items.filter(x=>x.id!==id); await save(); closeDetail(); render(); toast('已刪除'); };
function fillCats(sm,ss){
  const m=$('i-main'); m.innerHTML='';
  mains().forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x;m.appendChild(o);});
  const a=document.createElement('option');a.value='__new__';a.textContent='＋ 新增大類…';m.appendChild(a);
  m.value=sm&&data.taxonomy[sm]?sm:mains()[0]; fillSub(ss);
}
function fillSub(ss){
  const m=$('i-main').value, s=$('i-sub'); s.innerHTML='';
  const none=document.createElement('option');none.value='';none.textContent='（不分小類）';s.appendChild(none);
  (data.taxonomy[m]||[]).forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x;s.appendChild(o);});
  const a=document.createElement('option');a.value='__new__';a.textContent='＋ 新增小類…';s.appendChild(a);
  s.value=(ss&&(data.taxonomy[m]||[]).includes(ss))?ss:'';
}
function openForm(it){
  editId=it?it.id:null;
  $('formTitle').textContent=it?'編輯收藏':'收藏網站';
  $('saveBtn').textContent=it?'儲存變更':'收進收藏櫃';
  $('i-title').value=it?it.title:''; $('i-url').value=it?(it.url||''):'';
  $('i-tags').value=it?(it.tags||[]).join(', '):''; $('i-desc').value=it?(it.desc||''):'';
  $('i-img').value=(it&&it.image_url&&!it.image_url.startsWith('data:'))?it.image_url:'';
  pendingImg=it?(it.image_url||''):''; updatePrev(); fillCats(it?it.main:null,it?it.sub:null);
  $('formOverlay').classList.add('show'); setTimeout(()=>$('i-title').focus(),50);
}
function updatePrev(){ const p=$('imgPreview'), src=pendingImg||$('i-img').value.trim(); if(src){p.src=src;p.classList.add('show');}else p.classList.remove('show'); }
function closeForm(){ $('formOverlay').classList.remove('show'); editId=null; pendingImg=''; }
$('i-main').onchange=function(){ if(this.value==='__new__'){ const n=(prompt('新增大類名稱：')||'').trim(); if(n&&!data.taxonomy[n]){data.taxonomy[n]=[];save();} fillCats(data.taxonomy[n]?n:mains()[0]); } else fillSub(); };
$('i-sub').onchange=function(){ if(this.value==='__new__'){ const m=$('i-main').value, n=(prompt('在「'+m+'」底下新增小類：')||'').trim(); if(n&&!data.taxonomy[m].includes(n)){data.taxonomy[m].push(n);save();} fillSub(n||''); } };
$('i-img').oninput=()=>{ pendingImg=''; updatePrev(); };
function ytThumb(u){ const m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]{6,})/); return m?'https://img.youtube.com/vi/'+m[1]+'/hqdefault.jpg':''; }
$('grabMeta').onclick=async()=>{
  const url=$('i-url').value.trim();
  if(!/^https:\/\//.test(url)){ toast('先貼一個 https 網址'); return; }
  if(!HAS_CLAUDE_STORE){ toast('「帶入資訊」只在 Claude 預覽內可用;獨立檔案請手動填,或用 codex 整理好再匯入'); return; }
  const b=$('grabMeta'); b.disabled=true; b.textContent='讀取中…';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,
        messages:[{role:'user',content:'查這個網站,只回傳 JSON 不要 markdown 不要多餘文字:{"title":"網站名稱","desc":"一句繁體中文說明它是什麼、設計師為何會收","tags":["最多4個繁中或英文短標籤"]}。網站:'+url}],
        tools:[{type:'web_search_20250305',name:'web_search'}]})});
    const d=await resp.json(); if(d.error) throw new Error(d.error.message||'error');
    const txt=(d.content||[]).filter(x=>x.type==='text').map(x=>x.text).join(' ');
    const m=txt.match(/\{[\s\S]*\}/); if(!m) throw new Error('沒讀到資訊');
    const info=JSON.parse(m[0]);
    if(info.title&&!$('i-title').value.trim()) $('i-title').value=info.title;
    if(info.desc&&!$('i-desc').value.trim()) $('i-desc').value=info.desc;
    if(Array.isArray(info.tags)&&info.tags.length&&!$('i-tags').value.trim()) $('i-tags').value=info.tags.join(', ');
    toast('已帶入,確認後再存');
  }catch(e){ toast('帶入失敗:'+e.message); }
  finally{ b.disabled=false; b.textContent='帶入資訊'; }
};
$('grabImg').onclick=async()=>{
  const url=$('i-url').value.trim();
  if(!/^https:\/\//.test(url)){ toast('先在網址欄貼一個 https 網址'); return; }
  const yt=ytThumb(url); if(yt){ pendingImg=''; $('i-img').value=yt; updatePrev(); toast('YouTube 縮圖已帶入'); return; }
  if(!HAS_CLAUDE_STORE){ toast('「自動抓縮圖」只在 Claude 預覽內可用;獨立檔案請「上傳圖片」或直接貼圖片網址'); return; }
  const b=$('grabImg'); b.disabled=true; b.textContent='抓取中…';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:300,
        messages:[{role:'user',content:'Find the og:image preview of this exact page: '+url+'\nReply with ONLY the bare https image URL (ending .jpg/.png/.webp or a pbs.twimg.com link). If none verifiable, reply exactly NONE.'}],
        tools:[{type:'web_search_20250305',name:'web_search'}]})});
    const d=await resp.json(); if(d.error) throw new Error(d.error.message||'error');
    const txt=(d.content||[]).filter(x=>x.type==='text').map(x=>x.text).join(' ').trim();
    const m=txt.match(/https:\/\/[^\s"'<>)]+/);
    if(m&&!txt.startsWith('NONE')){ pendingImg=''; $('i-img').value=m[0]; updatePrev(); toast('已帶入縮圖,存後看卡片確認'); }
    else toast('抓不到公開縮圖,可手動貼圖網址');
  }catch(e){ toast('抓縮圖失敗:'+e.message); }
  finally{ b.disabled=false; b.textContent='自動抓縮圖'; }
};
$('uploadImgBtn').onclick=()=>$('imgFile').click();
$('imgFile').onchange=e=>{
  const f=e.target.files[0]; if(!f)return; const img=new Image();
  img.onload=()=>{ const max=560,sc=Math.min(1,max/img.width),w=Math.round(img.width*sc),h=Math.round(img.height*sc);
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);
    pendingImg=cv.toDataURL('image/jpeg',0.72); $('i-img').value=''; updatePrev(); toast('縮圖已就緒'); };
  img.onerror=()=>toast('這張圖讀不出來'); img.src=URL.createObjectURL(f);
};
$('saveBtn').onclick=async()=>{
  const title=$('i-title').value.trim(); if(!title){toast('至少要有名稱');return;}
  let main=$('i-main').value; if(main==='__new__')main=mains()[0];
  let sub=$('i-sub').value; if(sub==='__new__')sub='';
  const tags=$('i-tags').value.split(/[,，]/).map(s=>s.trim()).filter(Boolean);
  const image_url=pendingImg||$('i-img').value.trim();
  if(editId){ Object.assign(data.items.find(x=>x.id===editId),{title,url:$('i-url').value.trim(),main,sub,tags,desc:$('i-desc').value.trim(),image_url}); toast('已儲存變更'); }
  else{ data.items.unshift({id:'i'+Date.now().toString(36),title,url:$('i-url').value.trim(),main,sub,tags,desc:$('i-desc').value.trim(),image_url}); toast('已收進收藏櫃'); }
  await save(); closeForm(); render();
};
window.startEdit=id=>{ const it=data.items.find(x=>x.id===id); closeDetail(); openForm(it); };
function openCat(){ renderCat(); $('catOverlay').classList.add('show'); }
function renderCat(){
  const box=$('catManage'); box.innerHTML='';
  mains().forEach(m=>{
    const used=data.items.filter(it=>it.main===m).length;
    const grp=document.createElement('div'); grp.className='grp';
    grp.innerHTML='<div class="gh"><span class="dot" style="background:'+kcol(m)+'"></span><span class="nm">'+esc(m)+'</span><span class="cnt">'+used+'</span><button class="ren" data-rm="'+esc(m)+'">改名</button><button data-dm="'+esc(m)+'">刪除</button></div>';
    const subs=document.createElement('div'); subs.className='subs';
    (data.taxonomy[m]||[]).forEach(s=>{
      const u=data.items.filter(it=>it.main===m&&it.sub===s).length;
      const pill=document.createElement('span'); pill.className='pill';
      pill.innerHTML=esc(s)+'<span style="color:var(--mut)">'+u+'</span><button class="ren" data-rsm="'+esc(m)+'" data-rss="'+esc(s)+'" title="改名">✎</button><button data-dsm="'+esc(m)+'" data-dss="'+esc(s)+'" title="刪除">×</button>';
      subs.appendChild(pill);
    });
    const add=document.createElement('button'); add.className='add'; add.textContent='＋ 小類';
    add.onclick=()=>{const n=(prompt('在「'+m+'」底下新增小類：')||'').trim(); if(n&&!data.taxonomy[m].includes(n)){data.taxonomy[m].push(n);save();renderCat();renderSub();}};
    subs.appendChild(add); grp.appendChild(subs); box.appendChild(grp);
  });
  const addM=document.createElement('button'); addM.className='add'; addM.textContent='＋ 新增大類';
  addM.onclick=()=>{const n=(prompt('新增大類名稱：')||'').trim(); if(n&&!data.taxonomy[n]){data.taxonomy[n]=[];save();renderCat();renderTabs();}};
  box.appendChild(addM);

  // 標籤管理:改名/刪除都會連動到所有用到該標籤的收藏
  const tagCount={};
  data.items.forEach(it=>(it.tags||[]).forEach(t=>{tagCount[t]=(tagCount[t]||0)+1;}));
  const tags=Object.keys(tagCount).sort((a,b)=>tagCount[b]-tagCount[a]||a.localeCompare(b,'zh-Hant'));
  const tsec=document.createElement('div'); tsec.className='grp';
  tsec.innerHTML='<div class="gh"><span class="nm">標籤</span><span class="cnt">'+tags.length+'</span></div>';
  const tw=document.createElement('div'); tw.className='subs';
  if(!tags.length) tw.innerHTML='<span style="font-family:var(--mono);font-size:11px;color:var(--mut)">還沒有標籤</span>';
  tags.forEach(t=>{
    const pill=document.createElement('span'); pill.className='pill';
    pill.innerHTML=esc(t)+'<span style="color:var(--mut)">'+tagCount[t]+'</span><button class="ren" data-rt="'+esc(t)+'" title="改名">✎</button><button data-dt="'+esc(t)+'" title="刪除">×</button>';
    tw.appendChild(pill);
  });
  tsec.appendChild(tw); box.appendChild(tsec);

  // 大類改名(連動 items.main)
  box.querySelectorAll('[data-rm]').forEach(b=>b.onclick=async()=>{
    const old=b.getAttribute('data-rm'); const n=(prompt('大類「'+old+'」改名為：',old)||'').trim();
    if(!n||n===old) return; if(data.taxonomy[n]){ toast('已經有「'+n+'」這個大類'); return; }
    const tx={}; Object.keys(data.taxonomy).forEach(k=>{ tx[k===old?n:k]=data.taxonomy[k]; }); data.taxonomy=tx;
    let c=0; data.items.forEach(it=>{ if(it.main===old){ it.main=n; c++; } });
    if(activeMain===old) activeMain=n;
    await save(); renderCat(); render(); toast('已改名,連動 '+c+' 筆');
  });
  // 大類刪除
  box.querySelectorAll('[data-dm]').forEach(b=>b.onclick=async()=>{
    const m=b.getAttribute('data-dm'), used=data.items.filter(it=>it.main===m).length;
    if(used){toast('還有 '+used+' 個收藏在「'+m+'」,先移走再刪');return;}
    if(!confirm('刪除大類「'+m+'」?'))return; delete data.taxonomy[m];
    if(activeMain===m){activeMain='全部';activeSub='全部';} await save(); renderCat(); render();
  });
  // 小類改名(連動 items.sub)
  box.querySelectorAll('[data-rss]').forEach(b=>b.onclick=async()=>{
    const m=b.getAttribute('data-rsm'), old=b.getAttribute('data-rss'); const n=(prompt('小類「'+old+'」改名為：',old)||'').trim();
    if(!n||n===old) return; if((data.taxonomy[m]||[]).includes(n)){ toast('「'+m+'」底下已經有「'+n+'」'); return; }
    data.taxonomy[m]=data.taxonomy[m].map(x=>x===old?n:x);
    let c=0; data.items.forEach(it=>{ if(it.main===m&&it.sub===old){ it.sub=n; c++; } });
    if(activeMain===m&&activeSub===old) activeSub=n;
    await save(); renderCat(); render(); toast('已改名,連動 '+c+' 筆');
  });
  // 小類刪除
  box.querySelectorAll('[data-dss]').forEach(b=>b.onclick=async()=>{
    const m=b.getAttribute('data-dsm'), s=b.getAttribute('data-dss'), used=data.items.filter(it=>it.main===m&&it.sub===s).length;
    if(used){toast('還有 '+used+' 個在「'+s+'」,先移走再刪');return;}
    data.taxonomy[m]=data.taxonomy[m].filter(x=>x!==s); if(activeSub===s)activeSub='全部'; await save(); renderCat(); render();
  });
  // 標籤改名(連動所有 items.tags)
  box.querySelectorAll('[data-rt]').forEach(b=>b.onclick=async()=>{
    const old=b.getAttribute('data-rt'); const n=(prompt('標籤「'+old+'」改名為：',old)||'').trim();
    if(!n||n===old) return;
    let c=0; data.items.forEach(it=>{ if(it.tags&&it.tags.includes(old)){ it.tags=it.tags.map(x=>x===old?n:x).filter((x,i,a)=>a.indexOf(x)===i); c++; } });
    if(activeTag===old) activeTag=n;
    await save(); renderCat(); render(); toast('已連動改名,套用到 '+c+' 筆');
  });
  // 標籤刪除(從所有收藏移除)
  box.querySelectorAll('[data-dt]').forEach(b=>b.onclick=async()=>{
    const old=b.getAttribute('data-dt'), c=data.items.filter(it=>(it.tags||[]).includes(old)).length;
    if(!confirm('從全部 '+c+' 筆移除標籤「'+old+'」?'))return;
    data.items.forEach(it=>{ if(it.tags) it.tags=it.tags.filter(x=>x!==old); });
    if(activeTag===old) activeTag='';
    await save(); renderCat(); render(); toast('已移除標籤');
  });
}
$('exportBtn').onclick=()=>{ const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='收藏櫃-'+new Date().toISOString().slice(0,10)+'.json'; a.click(); toast('已匯出 JSON'); };
$('importBtn').onclick=()=>$('importFile').click();
$('importFile').onchange=e=>{ const f=e.target.files[0]; if(!f)return; const r=new FileReader();
  r.onload=async()=>{ try{ const inc=JSON.parse(r.result); if(!inc.items||!Array.isArray(inc.items))throw new Error('格式不符'); if(!confirm('匯入 '+inc.items.length+' 個收藏?會取代目前內容(可先匯出備份)。'))return; data=inc; if(!data.taxonomy)data.taxonomy={}; activeMain='全部';activeSub='全部'; await save(); render(); toast('已匯入'); }catch(err){ toast('匯入失敗:'+err.message); } e.target.value=''; };
  r.readAsText(f); };
$('addBtn').onclick=()=>openForm(null);
$('resetBtn')&&($('resetBtn').onclick=async()=>{ if(!confirm('清空並回到內建的收藏?'))return; data=structuredClone(SEED_DATA); activeMain='全部';activeSub='全部'; await save(); render(); toast('已重置'); });
$('search').addEventListener('input',e=>{query=e.target.value;render();});
$('sortSel').addEventListener('change',e=>{sortMode=e.target.value;render();});
window.filterTag=el=>{ activeTag=el.getAttribute('data-tag')||''; activeMain='全部'; activeSub='全部'; query=''; $('search').value=''; closeDetail(); render(); };
document.querySelectorAll('[data-cf]').forEach(b=>b.onclick=closeForm);
document.querySelectorAll('[data-cc]').forEach(b=>b.onclick=()=>{$('catOverlay').classList.remove('show');render();});
[['detailOverlay',closeDetail],['formOverlay',closeForm],['catOverlay',function(){$('catOverlay').classList.remove('show');render();}]].forEach(p=>$(p[0]).addEventListener('click',e=>{if(e.target.id===p[0])p[1]();}));
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDetail();closeForm();$('catOverlay').classList.remove('show');}});
if(READ_ONLY){ ['addBtn','importBtn','resetBtn'].forEach(id=>{ const e=$(id); if(e) e.style.display='none'; }); }
if(SPONSOR.show){ const sp=$('sponsorLink'); if(sp){ sp.href=SPONSOR.url; sp.textContent=SPONSOR.label; sp.style.display='inline-flex'; } }
(async function(){ await load(); render(); })();
</script>
</body>
